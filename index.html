<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visualizacao de Dados - Spotify Tracks Dataset</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1f2523;
      --muted: #68716c;
      --panel: #ffffff;
      --line: #d8ddd8;
      --green: #1db954;
      --blue: #276ef1;
      --coral: #e95b4a;
      --gold: #c88a12;
      --violet: #7b61ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.5;
    }

    header {
      background: #10251b;
      color: white;
      padding: 56px 24px 44px;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    p {
      margin: 0;
    }

    .lead {
      max-width: 780px;
      color: #d9e7df;
      font-size: 1.05rem;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
      max-width: 780px;
    }

    .stat {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      color: white;
    }

    .stat span {
      color: #c9d7d0;
      font-size: 0.9rem;
